<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Spiral Staircase Model</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #1a1a1a; }
        #canvas-container { width: 100vw; height: 100vh; }
        #ui-panel {
            position: absolute; top: 20px; left: 20px; color: white;
            background: rgba(0,0,0,0.7); padding: 15px; border-radius: 8px;
            backdrop-filter: blur(5px); box-shadow: 0 4px 6px rgba(0,0,0,0.3);
        }
        h3 { margin-top: 0; color: #4af; }
        button {
            background: #4af; color: white; border: none; padding: 10px 15px;
            border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%;
        }
        button:hover { background: #39d; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>

    <div id="ui-panel">
        <h3>Task 3: 3D Spiral Staircase</h3>
        <p>Use Left-Click + Drag to Rotate.<br>Right-Click + Drag to Pan.<br>Scroll to Zoom.</p>
        <button id="render-btn">📸 Save Rendered Image</button>
    </div>

    <div id="canvas-container"></div>

    <script>
        // --- 1. SETUP SCENE, CAMERA, & RENDERER ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1e1e24); // Studio background color

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(6, 8, 10);

        const renderer = new THREE.WebGLRenderer({ antialias: true, preserveDrawingBuffer: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        container.appendChild(renderer.domElement);

        // --- 2. CONTROLS ---
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.target.set(0, 3, 0);

        // --- 3. LIGHTING (Studio setup) ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);

        const mainLight = new THREE.DirectionalLight(0xffffff, 0.8);
        mainLight.position.set(5, 10, 7);
        mainLight.castShadow = true;
        mainLight.shadow.mapSize.width = 2048;
        mainLight.shadow.mapSize.height = 2048;
        scene.add(mainLight);

        const fillLight = new THREE.DirectionalLight(0x90b0ff, 0.3); // Subtle blue fill light
        fillLight.position.set(-5, 4, -5);
        scene.add(fillLight);

        // --- 4. MATERIALS ---
        const CentralPoleMaterial = new THREE.MeshStandardMaterial({ color: 0x333333, roughness: 0.2, metalness: 0.8 });
        const stepMaterial = new THREE.MeshStandardMaterial({ color: 0xa06030, roughness: 0.6, metalness: 0.1 }); // Wooden Look
        const railingMaterial = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.4, metalness: 0.9 });

        // --- 5. MODEL GENERATION (Spiral Staircase) ---
        const staircaseGroup = new THREE.Group();

        // Central Pillar
        const poleGeom = new THREE.CylinderGeometry(0.2, 0.2, 7, 32);
        const pole = new THREE.Mesh(poleGeom, CentralPoleMaterial);
        pole.position.y = 3.5;
        pole.castShadow = true;
        pole.receiveShadow = true;
        staircaseGroup.add(pole);

        // Floor / Base
        const floorGeom = new THREE.CylinderGeometry(5, 5, 0.1, 64);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x2d2d30, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeom, floorMat);
        floor.receiveShadow = true;
        staircaseGroup.add(floor);

        // Steps Parameters
        const totalSteps = 24;
        const stepHeight = 0.25;
        const stepAngleIncrement = 0.35; // Radians per step

        for (let i = 0; i < totalSteps; i++) {
            const stepGroup = new THREE.Group();
            
            // Individual Step Mesh
            const stepGeom = new THREE.BoxGeometry(2, 0.12, 0.4);
            // Shift geometry so it pivots around the central pole
            stepGeom.translate(1, 0, 0); 
            const stepMesh = new THREE.Mesh(stepGeom, stepMaterial);
            stepMesh.castShadow = true;
            stepMesh.receiveShadow = true;
            stepGroup.add(stepMesh);

            // Railing Spindle (Baluster)
            const spindleGeom = new THREE.CylinderGeometry(0.02, 0.02, 1, 8);
            const spindle = new THREE.Mesh(spindleGeom, railingMaterial);
            spindle.position.set(1.9, 0.5, 0);
            spindle.castShadow = true;
            stepGroup.add(spindle);

            // Position and rotate the step group dynamically
            stepGroup.position.y = i * stepHeight + 0.1;
            stepGroup.rotation.y = i * stepAngleIncrement;

            staircaseGroup.add(stepGroup);
        }

        scene.add(staircaseGroup);

        // --- 6. ANIMATION LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        // --- 7. RESPONSIVE WINDOW RESIZE ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- 8. CAPTURE RENDERED IMAGE ---
        document.getElementById('render-btn').addEventListener('click', () => {
            // Hide UI momentarily for a clean snapshot
            document.getElementById('ui-panel').style.display = 'none';
            renderer.render(scene, camera);
            
            const dataURL = renderer.domElement.toDataURL('image/png');
            
            const link = document.createElement('a');
            link.download = 'staircase_render.png';
            link.href = dataURL;
            link.click();
            
            // Restore UI
            document.getElementById('ui-panel').style.display = 'block';
        });
    </script>
</body>
</html>
